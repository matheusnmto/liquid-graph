<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e28"/>
      <stop offset="100%" stop-color="#0d1a16"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Arestas com opacidade decrescente -->
  <line x1="256" y1="256" x2="256" y2="80"  stroke="#1D9E75" stroke-width="8" opacity="1"   stroke-linecap="round"/>
  <line x1="256" y1="256" x2="408" y2="168" stroke="#1D9E75" stroke-width="8" opacity="0.8" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="408" y2="344" stroke="#1D9E75" stroke-width="8" opacity="0.6" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="256" y2="432" stroke="#1D9E75" stroke-width="8" opacity="0.4" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="104" y2="344" stroke="#1D9E75" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="104" y2="168" stroke="#1D9E75" stroke-width="8" opacity="0.2" stroke-linecap="round"/>

  <!-- Nós periféricos -->
  <circle cx="256" cy="80"  r="18" fill="#1D9E75" opacity="1"/>
  <circle cx="408" cy="168" r="18" fill="#1D9E75" opacity="0.8"/>
  <circle cx="408" cy="344" r="18" fill="#1D9E75" opacity="0.6"/>
  <circle cx="256" cy="432" r="18" fill="#1D9E75" opacity="0.4"/>
  <circle cx="104" cy="344" r="18" fill="#1D9E75" opacity="0.3"/>
  <circle cx="104" cy="168" r="18" fill="#1D9E75" opacity="0.2"/>

  <!-- Nó central sólido com glow -->
  <circle cx="256" cy="256" r="42" fill="#1D9E75" filter="url(#glow)"/>
</svg>
